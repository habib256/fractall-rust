name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build + tests (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Install native dependencies (GMP / MPFR / MPC)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp-dev libmpfr-dev libmpc-dev

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-ubuntu

      - name: Unit tests (fractall-cli)
        run: cargo test --release --locked --bin fractall-cli

      - name: Unit tests (fractall-quality — metrics + presets)
        run: cargo test --release --locked --bin fractall-quality

      - name: Golden image tests
        run: cargo test --release --locked --test golden_images
