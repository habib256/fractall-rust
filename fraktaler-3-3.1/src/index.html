    <script type='text/javascript'>

      // Don't pass Ctrl-V as a key event to Emscripten/SDL2.
      // Instead let the browser interpret it as a paste event.
      // Do the same with F11 (for fullscreen).
      // FIXME probably fails on macOS?
      // <https://github.com/emscripten-ports/SDL2/issues/125#issuecomment-657606557>
      var original_addEventListener = window.addEventListener;
      window.addEventListener = function (type, handler, opts)
      {
        if (type === "keyup" || type === "keydown" || type === "keypress")
        {
          original_addEventListener(type, function (e) {
            let key = e.which || e.keyCode;
            let ctrl = e.ctrlKey ? e.ctrlKey : ((key === 17) ? true : false);
            if ((ctrl && (key == /*V*/86)) || (key == /*F11*/122))
              return false;
            handler(e);
          }, opts);
        }
        else
        {
          original_addEventListener(type, handler, opts);
        }
      };

      var canvasElement = document.querySelector('canvas');
      var Module = {
            arguments: [], /* "--url=" + window.location.hash ], */
            print(...args) { console.log(...args); },
            canvas: canvasElement,
            setStatus(text) { },
            monitorRunDependencies(left) { },
            onRuntimeInitialized() {
              // As a default initial behavior, pop up an alert when webgl context is lost. To make your
              // application robust, you may want to override this behavior before shipping!
              // See http://www.khronos.org/registry/webgl/specs/latest/1.0/#5.15.2
              canvasElement.addEventListener("webglcontextlost", function(e) { alert('WebGL context lost. You will need to reload the page.'); e.preventDefault(); }, false);
/*

*/
