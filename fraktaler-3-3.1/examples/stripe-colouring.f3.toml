[colour]
shader = """
uniform int stripes;

// FIXME this needs to match the formula window
vec2 formula(vec2 z, vec2 c, int n)
{
  const int phases = 4;
  switch (n % phases)
  {
    case 1:
      z = vec2(abs(z.x), -abs(z.y));
      break;
    default:
      break;
  }
  return vec2(z.x * z.x - z.y * z.y, 2.0 * z.x * z.y) + c;
}

vec3 colour(void)
{
  const float pi = 3.141592653;
  const float gamma = 1.5;
  float t = getT() * 2.0 * pi;
  float f = getNF();
  vec2 z = vec2(cos(t), sin(t));
  float w = 1.0 -  f;
  float g = 0.0;
  int phase = int(getN0());
  for (int stripe = 0; stripe < stripes; ++stripe)
  {
    g += w * z.y;
    w = 1.0;
    z = formula(z, vec2(0.0, 0.0), phase + stripe);
  }
  w = f;
  g += w * z.y;
 
  float h = 0.5 + g / float(2.0 * float(stripes + 1));
  float v = 0.25 + 0.25 * log2(length(getDE()));
  float s = h;
  h += 0.25;
  h -= floor(h);
  v += 1.0;
  v = clamp(v, 0.0, 1.0);
  vec3 rgb = hsv2rgb(vec3(h, s, v));
  if (length(getDE()) <= 0.0)
  {
    rgb = vec3(0.0);
  }
  rgb = pow(rgb, vec3(1.0 / gamma));
  return rgb;
}
\
"""

[[colour.uniforms]]
value = 3
type = "int"
name = "stripes"
index = 0
component = 0

[colour.background]
r = 0.5
g = 0.5
b = 0.5

